name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - master

jobs:
  create-deployment:
    name: Create Deployment
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
      env: ${{ steps.deployment.outputs.env }}
    steps:
      - name: Create Deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: pi-prod

  deploy:
    name: Deploy to Raspberry Pi
    needs: create-deployment
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Environment and Install Dependencies
        run: |
          # Sync the checked-out code to the actual bot folder excluding .venv and data so we don't accidentally overwrite them.
          rsync -av --exclude='.venv' --exclude='data' --exclude='.git' ./ /home/glex/Documents/GitHub/Rye-Chan-Bot/

      - name: Install Dependencies
        run: |
          cd /home/glex/Documents/GitHub/Rye-Chan-Bot
          if [ -d ".venv" ]; then
            source .venv/bin/activate
            pip install -r requirements.txt
          else
            echo "Error: Virtual environment '.venv' not found in /home/glex/Documents/GitHub/Rye-Chan-Bot!"
            exit 1
          fi

      - name: Restart Systemd Service
        run: |
          cd /home/glex/Documents/GitHub/Rye-Chan-Bot
          bash scripts/restart_and_verify.sh

  finish_deployment:
    name: Finish Deployment
    needs: [create-deployment, deploy]
    runs-on: ubuntu-latest
    if: always() && needs.create-deployment.result == 'success'
    steps:
      - name: Finish Deployment
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ needs.deploy.result }}
          env: ${{ needs.create-deployment.outputs.env }}
          deployment_id: ${{ needs.create-deployment.outputs.deployment_id }}
